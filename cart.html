<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - FANCY FEET UG</title>
    
    <style>
        /* ============================================
           RESET & BASE
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f0eb;
            color: #2d1b12;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(199, 154, 110, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(90, 62, 43, 0.05) 0%, transparent 50%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            flex: 1;
        }

        /* ============================================
           HEADER
           ============================================ */
        header {
            background: linear-gradient(135deg, #5a3e2b, #3d2a1d, #2d1b12);
            color: #f5ede6;
            padding: 1.2rem 0;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid #c79a6e;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo h1 {
            font-size: 2.4rem;
            letter-spacing: 3px;
            font-weight: 900;
            color: #f5ede6;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .logo h1::after {
            content: '👟';
            margin-left: 10px;
            font-size: 2rem;
        }

        .logo .tagline {
            font-size: 0.9rem;
            opacity: 0.9;
            font-style: italic;
            color: #d4c5b8;
            letter-spacing: 2px;
        }

        nav {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        nav a {
            color: #f5ede6;
            text-decoration: none;
            font-weight: 600;
            padding: 0.6rem 1.4rem;
            border-radius: 30px;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            position: relative;
            overflow: hidden;
        }

        nav a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s ease;
        }

        nav a:hover::before {
            left: 100%;
        }

        nav a:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        nav a.active {
            background: linear-gradient(135deg, #c79a6e, #b8895a);
            color: #2d1b12;
            box-shadow: 0 4px 20px rgba(199, 154, 110, 0.4);
        }

        #cart-count {
            display: inline-block;
            background: #ffd700;
            color: #2d1b12;
            border-radius: 50%;
            padding: 0 8px;
            font-weight: 800;
            font-size: 0.8rem;
            min-width: 22px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.4);
        }

        /* ============================================
           CART PAGE - JUST ITEMS!
           ============================================ */
        .cart-header {
            text-align: center;
            margin: 2.5rem 0 2rem;
        }

        .cart-header h2 {
            color: #2d1b12;
            font-size: 2.5rem;
            font-weight: 900;
        }

        .cart-header h2 span {
            color: #c79a6e;
        }

        .cart-header p {
            color: #8a7a6e;
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        #cart-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
            align-items: start;
        }

        /* ============================================
           CART ITEMS LIST
           ============================================ */
        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .cart-item {
            background: white;
            padding: 1.5rem;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
            border-left: 4px solid #c79a6e;
        }

        .cart-item:hover {
            box-shadow: 0 8px 35px rgba(90, 62, 43, 0.15);
            transform: translateY(-3px);
        }

        .cart-item-info {
            flex: 1;
            min-width: 150px;
        }

        .cart-item-name {
            font-weight: 800;
            color: #2d1b12;
            font-size: 1.1rem;
        }

        .cart-item-price {
            color: #8a7a6e;
            font-size: 0.9rem;
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .qty-btn {
            background: #e8ddd2;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.3rem;
            color: #2d1b12;
        }

        .qty-btn:hover {
            background: #c79a6e;
            color: white;
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(199, 154, 110, 0.3);
        }

        .qty-value {
            font-weight: 800;
            min-width: 30px;
            text-align: center;
            font-size: 1.2rem;
        }

        .cart-item-total {
            font-weight: 800;
            color: #5a3e2b;
            min-width: 120px;
            font-size: 1.2rem;
        }

        .btn-remove {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .btn-remove:hover {
            background: #c0392b;
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
        }

        /* ============================================
           CART SUMMARY - JUST TOTAL & CHECKOUT BUTTON
           ============================================ */
        .cart-summary {
            background: white;
            padding: 2rem;
            border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            align-self: start;
            position: sticky;
            top: 100px;
            border-top: 4px solid #c79a6e;
        }

        .cart-summary h3 {
            margin-bottom: 1.5rem;
            color: #2d1b12;
            font-size: 1.4rem;
            border-bottom: 2px solid #f0ebe6;
            padding-bottom: 0.8rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.3rem;
            font-weight: 700;
            padding: 1.2rem 0;
            border-top: 2px solid #f0ebe6;
            color: #2d1b12;
        }

        .summary-row .total-amount {
            color: #5a3e2b;
            font-size: 1.5rem;
        }

        .btn-checkout {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #5a3e2b, #3d2a1d);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            letter-spacing: 1px;
        }

        .btn-checkout:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 30px rgba(90, 62, 43, 0.4);
            background: linear-gradient(135deg, #3d2a1d, #2d1b12);
        }

        /* ============================================
           EMPTY CART
           ============================================ */
        .empty-cart {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 18px;
            grid-column: 1 / -1;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

        .empty-cart .empty-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }

        .empty-cart p {
            font-size: 1.3rem;
            color: #8a7a6e;
            margin-bottom: 1.5rem;
        }

        .empty-cart a {
            color: #5a3e2b;
            font-weight: 700;
            text-decoration: none;
            padding: 12px 35px;
            border: 2px solid #5a3e2b;
            border-radius: 50px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .empty-cart a:hover {
            background: #5a3e2b;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(90, 62, 43, 0.3);
        }

        /* ============================================
           FOOTER
           ============================================ */
        footer {
            background: linear-gradient(135deg, #2d1b12, #1a0f0a);
            color: #c9b5a6;
            text-align: center;
            padding: 2.5rem 0;
            margin-top: auto;
            border-top: 4px solid #c79a6e;
            position: relative;
        }

        footer::before {
            content: '';
            position: absolute;
            top: -4px;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #c79a6e, #ffd700, #c79a6e);
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        footer p {
            opacity: 0.85;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        .footer-heart {
            color: #e74c3c;
            animation: pulse 1.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 768px) {
            .header-container {
                flex-direction: column;
                text-align: center;
            }

            nav {
                justify-content: center;
            }

            nav a {
                padding: 0.4rem 1rem;
                font-size: 0.85rem;
            }

            #cart-container {
                grid-template-columns: 1fr;
            }

            .cart-summary {
                position: static;
            }

            .logo h1 {
                font-size: 1.8rem;
            }

            .cart-item {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }

            .cart-item-quantity {
                justify-content: center;
            }

            .cart-item-total {
                min-width: auto;
            }

            .cart-header h2 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .logo h1 {
                font-size: 1.5rem;
            }

            .cart-item {
                padding: 1rem;
            }

            .cart-item-name {
                font-size: 0.95rem;
            }

            .qty-btn {
                width: 32px;
                height: 32px;
                font-size: 1.1rem;
            }

            .btn-checkout {
                font-size: 0.95rem;
                padding: 14px;
            }

            .empty-cart .empty-icon {
                font-size: 3.5rem;
            }

            .empty-cart p {
                font-size: 1rem;
            }
        }

        /* ============================================
           SCROLLBAR
           ============================================ */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: #f0ebe6;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #c79a6e, #5a3e2b);
            border-radius: 10px;
            border: 3px solid #f0ebe6;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #5a3e2b, #2d1b12);
        }

        /* ============================================
           ANIMATIONS
           ============================================ */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cart-item {
            animation: fadeInUp 0.5s ease forwards;
        }

        .cart-item:nth-child(2) { animation-delay: 0.1s; }
        .cart-item:nth-child(3) { animation-delay: 0.2s; }
        .cart-item:nth-child(4) { animation-delay: 0.3s; }
        .cart-item:nth-child(5) { animation-delay: 0.4s; }
    </style>
    
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header>
        <div class="header-container">
            <div class="logo">
                <h1>FANCY FEET UG</h1>
                <p class="tagline">✦ Step into style & comfort ✦</p>
            </div>
            <nav>
                <a href="index.html">Products</a>
                <a href="cart.html" class="active">Cart (<span id="cart-count">0</span>)</a>
                <a href="checkout.html">Checkout</a>
            </nav>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="container">
        
        <!-- Cart Header -->
        <div class="cart-header">
            <h2>🛒 Your <span>Cart</span></h2>
            <p>Review your items before checking out</p>
        </div>

        <div id="cart-container">
            
            <!-- ===== CART ITEMS LIST ===== -->
            <div id="cart-items" class="cart-items">
                <!-- Cart items loaded by JavaScript -->
            </div>
            
            <!-- ===== CART SUMMARY - JUST TOTAL & CHECKOUT BUTTON ===== -->
            <div id="cart-summary" class="cart-summary">
                <h3>📊 Order Summary</h3>
                <div class="summary-row">
                    <span>Total:</span>
                    <span class="total-amount" id="cart-total">UGX 0</span>
                </div>
                <button id="proceed-checkout" class="btn-checkout">Proceed to Checkout →</button>
            </div>

        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p>© 2026 FANCY FEET UG &nbsp;|&nbsp; Made with <span class="footer-heart">❤️</span> in Uganda &nbsp;|&nbsp; Step into style & comfort</p>
    </footer>

    <!-- ============================================
         JAVASCRIPT
         ============================================ -->
    <script>
        /* ============================================
           PRODUCT DATA
           ============================================ */
        const products = [
            { id: 1, name: "BING BACKLE SANDLES", price: 85000, category: "Sandals", image: "BING BACKLE SANDLES.jpg" },
            { id: 2, name: "CRISS CROSS SANDLES", price: 65000, category: "Sandals", image: "CRISS CROSS SANDLES.jpg" },
            { id: 3, name: "DOUBLE BUCKLE SANDLES", price: 89000, category: "Sandals", image: "DOUBLE BUCKLE SANDLES.jpg" },
            { id: 4, name: "DOUBLE STRAP SANDLES", price: 45000, category: "Sandals", image: "DOUBLE STRAP SANDLES.jpg" },
            { id: 5, name: "RHINE STONE SLIDE SANDLES", price: 95000, category: "Sandals", image: "RHINE STONE SLIDE SANDLES.jpg" },
            { id: 6, name: "SANDLES", price: 55000, category: "Sandals", image: "SANDLES.jpg" },
            { id: 7, name: "THONG SANDLES", price: 40000, category: "Sandals", image: "THONG SANDLES.jpg" },
            { id: 8, name: "TOE RING FLAT SANDLES", price: 70000, category: "Sandals", image: "TOE RING FLAT SANDLES.jpg" },
            { id: 9, name: "WOVEN SANDLES", price: 80000, category: "Sandals", image: "WOVEN SANDLES.jpg" },
            { id: 10, name: "LOAFERS", price: 75000, category: "Loafers", image: "LOAFERS.jpg" },
            { id: 11, name: "MESH LOAFERS", price: 95000, category: "Loafers", image: "MESH LOAFERS.jpg" },
            { id: 12, name: "SAMBAS", price: 55000, category: "Shoes", image: "SAMBAS.jpg" },
            { id: 13, name: "SLING BACK SHOES", price: 120000, category: "Shoes", image: "SLING BACK SHOES.jpg" },
            { id: 14, name: "FLATS", price: 65000, category: "Flats", image: "FLATS.jpg" },
            { id: 15, name: "FLAT SLIDES", price: 50000, category: "Flats", image: "FLAT SLIDES.jpg" },
            { id: 16, name: "LEAF VINE FLATS", price: 80000, category: "Flats", image: "LEAF VINE FLATS.jpg" },
            { id: 17, name: "MULE FLATS", price: 75000, category: "Flats", image: "MULE FLATS.jpg" },
            { id: 18, name: "STRAPPY FLATS", price: 110000, category: "Flats", image: "STRAPPY FLATS.jpg" },
            { id: 19, name: "STRAPY FLATS", price: 90000, category: "Flats", image: "STRAPY FLATS.jpg" },
            { id: 20, name: "TOE RING FLATS", price: 70000, category: "Flats", image: "TOE RING FLATS.jpg" },
            { id: 21, name: "BOW NOTE MULE SLIDES", price: 85000, category: "Mules", image: "BOW NOTE MULE SLIDES.jpg" },
            { id: 22, name: "MESH MULES", price: 90000, category: "Mules", image: "MESH MULES.jpg" },
            { id: 23, name: "RHINESTONE MULES", price: 100000, category: "Mules", image: "RHINESTONE MULES.jpg" },
            { id: 24, name: "SLIP ON MULES", price: 85000, category: "Mules", image: "SLIP ON MULES.jpg" },
            { id: 25, name: "WEDGES", price: 95000, category: "Wedges", image: "WEDGES.jpg" }
        ];

        /* ============================================
           CART MANAGEMENT
           ============================================ */

        function getCart() {
            try {
                const cart = localStorage.getItem('hfeetsCart');
                return cart ? JSON.parse(cart) : [];
            } catch (error) {
                console.error("Error loading cart:", error);
                return [];
            }
        }

        function saveCart(cart) {
            try {
                localStorage.setItem('hfeetsCart', JSON.stringify(cart));
                updateCartCount();
            } catch (error) {
                console.error("Error saving cart:", error);
            }
        }

        function updateCartCount() {
            const cart = getCart();
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.querySelectorAll('#cart-count').forEach(el => {
                el.textContent = totalItems;
            });
        }

        /* ============================================
           DISPLAY CART
           ============================================ */

        function displayCart() {
            const container = document.getElementById('cart-items');
            if (!container) return;
            
            const cart = getCart();
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-icon">🛒</div>
                        <p>Your cart is empty</p>
                        <a href="index.html">Start Shopping →</a>
                    </div>
                `;
                document.getElementById('cart-total').textContent = 'UGX 0';
                return;
            }
            
            let total = 0;
            container.innerHTML = cart.map((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">UGX ${item.price.toLocaleString()} each</div>
                        </div>
                        <div class="cart-item-quantity">
                            <button class="qty-btn" onclick="updateQuantity(${index}, -1)">−</button>
                            <span class="qty-value">${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${index}, 1)">+</button>
                        </div>
                        <div class="cart-item-total">UGX ${itemTotal.toLocaleString()}</div>
                        <button class="btn-remove" onclick="removeFromCart(${index})">✕ Remove</button>
                    </div>
                `;
            }).join('');
            
            document.getElementById('cart-total').textContent = `UGX ${total.toLocaleString()}`;
        }

        /* ============================================
           UPDATE & REMOVE FROM CART
           ============================================ */

        function updateQuantity(index, change) {
            try {
                let cart = getCart();
                if (!cart[index]) throw new Error("Item not found");
                
                const newQuantity = cart[index].quantity + change;
                
                if (newQuantity <= 0) {
                    cart.splice(index, 1);
                } else {
                    cart[index].quantity = newQuantity;
                }
                
                saveCart(cart);
                displayCart();
                updateCartCount();
            } catch (error) {
                console.error("Error updating quantity:", error);
                alert("Failed to update quantity. Please try again.");
            }
        }

        function removeFromCart(index) {
            try {
                let cart = getCart();
                if (!cart[index]) throw new Error("Item not found");
                
                if (confirm(`Remove "${cart[index].name}" from cart?`)) {
                    cart.splice(index, 1);
                    saveCart(cart);
                    displayCart();
                    updateCartCount();
                }
            } catch (error) {
                console.error("Error removing item:", error);
                alert("Failed to remove item. Please try again.");
            }
        }

        /* ============================================
           PROCEED TO CHECKOUT
           ============================================ */

        function setupProceedCheckout() {
            const proceedBtn = document.getElementById('proceed-checkout');
            if (proceedBtn) {
                proceedBtn.addEventListener('click', () => {
                    const cart = getCart();
                    if (cart.length === 0) {
                        alert("❌ Your cart is empty! Please add items before checking out.");
                    } else {
                        window.location.href = 'checkout.html';
                    }
                });
            }
        }

        /* ============================================
           PAGE INITIALIZATION
           ============================================ */

        document.addEventListener('DOMContentLoaded', function() {
            updateCartCount();
            displayCart();
            setupProceedCheckout();
        });
    </script>
    
</body>
</html>
